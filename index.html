<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0f1e" />
    <!--
      THEME SCRIPT — runs synchronously before first paint, no flash.
      Deploy stamp "20260717" forces everyone back to dark on this deploy.
      After that, localStorage saves the user's own choice per-browser.
    -->
    <script>
      (function () {
        var DEPLOY = '20260717';
        var stamp  = localStorage.getItem('ndm-deploy');
        var saved  = localStorage.getItem('ndm-theme');
        if (stamp !== DEPLOY) {
          // Old storage (pre this deploy) or first visit — reset everyone to dark.
          localStorage.removeItem('ndm-theme');
          localStorage.setItem('ndm-deploy', DEPLOY);
          // HTML already has class="dark" — nothing else needed.
        } else if (saved === 'light') {
          // User explicitly picked light AFTER this deploy — honour it.
          document.documentElement.classList.replace('dark', 'light');
        }
        // saved === 'dark' or null → dark stays (class already set in HTML).
      })();
    </script>
    <title>Nexgen — Digital Marketing &amp; Growth Agency in Ahmedabad</title>
    <meta
      name="description"
      content="Nexgen Digital Marketing Solutions — Ahmedabad's growth partner for social media, SEO, Google &amp; Meta ads, websites and apps. We turn ideas into impact."
    />
    <meta name="author" content="Nexgen Digital Marketing Solutions" />
    <meta property="og:site_name" content="Nexgen Digital Marketing Solutions" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Nexgen — Digital Marketing &amp; Growth Agency" />
    <meta
      property="og:description"
      content="Creative digital marketing agency in Ahmedabad. Social media, SEO, ads, websites &amp; branding — engineered to grow your brand."
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
